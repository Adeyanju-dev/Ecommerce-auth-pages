<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #222;
    }

    p {
      color: #555;
      line-height: 1.5;
    }

    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .loading {
      background: #eef3ff;
      color: #2d5bdb;
    }

    .success {
      background: #e9f9ee;
      color: #1d7a3d;
    }

    .error {
      background: #fdecec;
      color: #b42318;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email Verification</h1>
    <p>We are verifying your email address.</p>
    <div id="status" class="status loading">Please wait...</div>
  </div>

  <script>
    const API_BASE_URL = "https://ecommerce-backend-api-k8c8.onrender.com";

    async function verifyEmail() {
      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      const token = params.get("token");
      const statusBox = document.getElementById("status");

      if (!uid || !token) {
        statusBox.className = "status error";
        statusBox.textContent = "Invalid verification link.";
        return;
      }

      try {
        const response = await fetch(
          `${API_BASE_URL}/api/auth/verify-email/?uid=${encodeURIComponent(uid)}&token=${encodeURIComponent(token)}`
        );

        const data = await response.json();

        if (response.ok) {
          statusBox.className = "status success";
          statusBox.textContent = data.detail || "Email verified successfully.";
        } else {
          statusBox.className = "status error";
          statusBox.textContent = data.detail || "Verification failed.";
        }
      } catch (error) {
        statusBox.className = "status error";
        statusBox.textContent = "Something went wrong. Please try again.";
      }
    }

    verifyEmail();
  </script>
</body>
</html>
