<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 450px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #222;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

    .success {
      display: block;
      background: #e9f9ee;
      color: #1d7a3d;
    }

    .error {
      display: block;
      background: #fdecec;
      color: #b42318;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p>Enter your new password below.</p>

    <form id="resetForm">
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" required />
      </div>

      <div class="form-group">
        <label for="new_password_confirm">Confirm New Password</label>
        <input type="password" id="new_password_confirm" required />
      </div>

      <button type="submit">Reset Password</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const API_BASE_URL = "https://ecommerce-backend-api-k8c8.onrender.com";

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const params = new URLSearchParams(window.location.search);
      const uid = params.get("uid");
      const token = params.get("token");

      const newPassword = document.getElementById("new_password").value;
      const newPasswordConfirm = document.getElementById("new_password_confirm").value;
      const messageBox = document.getElementById("message");

      if (!uid || !token) {
        messageBox.className = "message error";
        messageBox.textContent = "Invalid reset link.";
        return;
      }

      if (newPassword !== newPasswordConfirm) {
        messageBox.className = "message error";
        messageBox.textContent = "Passwords do not match.";
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/reset-password-confirm/`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            uid: uid,
            token: token,
            new_password: newPassword,
            new_password_confirm: newPasswordConfirm
          })
        });

        const data = await response.json();

        if (response.ok) {
          messageBox.className = "message success";
          messageBox.textContent = data.detail || "Password reset successful.";
          document.getElementById("resetForm").reset();
        } else {
          messageBox.className = "message error";
          messageBox.textContent = data.detail || "Password reset failed.";
        }
      } catch (error) {
        messageBox.className = "message error";
        messageBox.textContent = "Something went wrong. Please try again.";
      }
    });
  </script>
</body>
</html>
